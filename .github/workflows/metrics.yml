# Gera o card de estatísticas (github-metrics.svg) e faz commit no repositório.
# Roda a cada 12h e também pode ser disparado manualmente na aba Actions.
# Docs: https://github.com/lowlighter/metrics
name: Metrics

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches: ["main", "master"]

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Crie um Personal Access Token (classic) com escopo "repo" e salve
          # em Settings > Secrets and variables > Actions como METRICS_TOKEN.
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          user: danielmnunes
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Fortaleza

          # Linguagens mais usadas
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8

          # Estatísticas isoladas (commits, PRs, issues, estrelas)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
